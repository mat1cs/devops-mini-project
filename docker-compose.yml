version: "3.9"
services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    container_name: flask_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_ENV: production
      APP_PORT: 5000
      DB_HOST: db
      DB_USER: devuser
      DB_PASSWORD: devpass
      DB_NAME: devdb
    ports:
      - "8000:5000"
volumes:
  postgres_data: